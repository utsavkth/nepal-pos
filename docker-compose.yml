services:
  pos:
    build: .
    image: nepal-pos
    container_name: nepal-pos
    restart: unless-stopped
    labels:
      # This image is built locally from source (no registry push), so
      # Watchtower can never find a newer version to pull — it was just
      # polling and reporting "not updated" every day. Deploys are
      # deliberate: git pull + docker compose up -d --build via Termius,
      # not automatic.
      - "com.centurylinklabs.watchtower.enable=false"
    ports:
      # host 5050 -> container 5000; Caddy reverse-proxies to 5050 (phase 7)
      - "5050:5000"
    volumes:
      # SQLite databases persist on the Pi's HDD alongside the other container
      # data (CLAUDE.md decision 5), not the SD card.
      - /srv/dev-disk-by-uuid-d83cca89-bc12-4315-a166-686c581461cf/Docker-Data/nepal-pos:/app/data
    environment:
      # Session signing key, from a .env file next to this compose file (not
      # committed). Compose fails fast with this message if it's missing.
      # The admin password is NOT set here — it's chosen on first visit to
      # /admin and stored hashed in the database.
      - SECRET_KEY=${SECRET_KEY:?set SECRET_KEY in .env}
