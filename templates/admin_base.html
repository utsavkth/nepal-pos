<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{% block title %}Admin{% endblock %} — Pasal POS</title>
<link rel="stylesheet" href="{{ url_for('static', filename='admin.css') }}">
</head>
<body>
<header class="admin-header">
  <span class="admin-brand">Pasal POS Admin</span>
  <nav>
    <a href="{{ url_for('admin_products') }}">Products</a>
    <a href="{{ url_for('admin_reports') }}">Reports</a>
    <a href="{{ url_for('admin_sales_export') }}">Export sales CSV</a>
    <a href="{{ url_for('admin_import') }}">Import products</a>
    <a href="{{ url_for('cashier') }}">Cashier screen</a>
    <a href="{{ url_for('admin_logout') }}">Log out</a>
  </nav>
</header>
<main class="admin-main">
  {% with messages = get_flashed_messages() %}
    {% for msg in messages %}<p class="flash">{{ msg }}</p>{% endfor %}
  {% endwith %}
  {% block content %}{% endblock %}
</main>
</body>
</html>
