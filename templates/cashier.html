<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Pasal POS</title>
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="layout">

  <section class="controls">
    <div class="controls-header">
      <span class="brand">Pasal POS</span>
      <a class="admin-link" href="{{ url_for('admin_home') }}">⚙ Admin</a>
    </div>

    <div class="top-row">
      <button id="scan-btn" class="btn btn-scan" type="button">📷 SCAN</button>
      <input id="search-input" type="search" placeholder="Search item…"
             autocomplete="off" autocapitalize="off" spellcheck="false">
    </div>

    <ul id="search-results" class="search-results" hidden></ul>

    <div id="quick-taps" class="quick-taps"></div>

    <button id="quick-add-btn" class="btn btn-quick-add" type="button">+ Quick Add item</button>
  </section>

  <section class="bill">
    <div class="bill-title">
      <span>Bill</span>
      <button id="clear-bill-btn" class="btn-clear-bill" type="button" disabled>Clear</button>
    </div>
    <ul id="bill-lines" class="bill-lines"></ul>
    <div class="bill-footer">
      <div class="bill-total-row">
        <span>Total</span>
        <strong id="bill-total">Rs. 0.00</strong>
      </div>
      <button id="new-sale-btn" class="btn btn-new-sale" type="button" disabled>NEW SALE</button>
    </div>
  </section>

</div>

<!-- Weight pad modal -->
<div id="weight-modal" class="modal" hidden>
  <div class="modal-box">
    <h3 id="weight-title">Rice</h3>
    <div class="weight-display">
      <span id="weight-value">0</span> kg
      <span id="weight-line-total" class="weight-line-total">Rs. 0.00</span>
    </div>
    <div class="numpad">
      <button data-key="7">7</button><button data-key="8">8</button><button data-key="9">9</button>
      <button data-key="4">4</button><button data-key="5">5</button><button data-key="6">6</button>
      <button data-key="1">1</button><button data-key="2">2</button><button data-key="3">3</button>
      <button data-key=".">.</button><button data-key="0">0</button><button data-key="del">⌫</button>
    </div>
    <div class="modal-actions">
      <button id="weight-cancel" class="btn btn-cancel" type="button">Cancel</button>
      <button id="weight-ok" class="btn btn-ok" type="button" disabled>ADD</button>
    </div>
  </div>
</div>

<!-- Variety picker modal (category quick-tap -> pick specific product) -->
<div id="variety-modal" class="modal" hidden>
  <div class="modal-box">
    <h3 id="variety-title">Rice</h3>
    <ul id="variety-list" class="variety-list"></ul>
    <div class="modal-actions">
      <button id="variety-cancel" class="btn btn-cancel" type="button">Cancel</button>
    </div>
  </div>
</div>

<!-- Price override modal (this sale only) -->
<div id="price-modal" class="modal" hidden>
  <div class="modal-box">
    <h3 id="price-title">Change price</h3>
    <p id="price-current" class="price-current"></p>
    <div class="weight-display">
      <span id="price-value">0</span>
      <span class="weight-line-total">new price in Rs.<span id="price-unit-suffix"></span></span>
    </div>
    <div class="numpad">
      <button data-key="7">7</button><button data-key="8">8</button><button data-key="9">9</button>
      <button data-key="4">4</button><button data-key="5">5</button><button data-key="6">6</button>
      <button data-key="1">1</button><button data-key="2">2</button><button data-key="3">3</button>
      <button data-key=".">.</button><button data-key="0">0</button><button data-key="del">⌫</button>
    </div>
    <div class="modal-actions">
      <button id="price-cancel" class="btn btn-cancel" type="button">Cancel</button>
      <button id="price-ok" class="btn btn-ok" type="button" disabled>CHANGE</button>
    </div>
  </div>
</div>

<!-- Confirm sale modal (guards against accidental NEW SALE taps) -->
<div id="confirm-modal" class="modal" hidden>
  <div class="modal-box">
    <h3>Confirm sale</h3>
    <p class="confirm-text">Confirm this sale?<strong id="confirm-amount">Rs. 0.00</strong></p>
    <div class="modal-actions">
      <button id="confirm-cancel" class="btn btn-cancel" type="button">Cancel</button>
      <button id="confirm-ok" class="btn btn-ok" type="button">Confirm &amp; save</button>
    </div>
  </div>
</div>

<!-- Quick Add modal -->
<div id="quick-add-modal" class="modal" hidden>
  <div class="modal-box">
    <h3>Quick Add</h3>
    <p id="quick-add-barcode-note" class="barcode-note" hidden></p>
    <label class="field">
      <span>Name</span>
      <input id="quick-add-name" type="text" autocomplete="off">
    </label>
    <label class="field field-checkbox">
      <input id="quick-add-weighed" type="checkbox">
      <span>Sold by weight (per kg)</span>
    </label>
    <label class="field" id="quick-add-group-field" hidden>
      <span>Weighed category</span>
      <select id="quick-add-group">
        <option value="Rice">Rice</option>
        <option value="Dal">Dal</option>
        <option value="Sugar">Sugar</option>
        <option value="Flour">Flour</option>
        <option value="Other">Other</option>
      </select>
    </label>
    <label class="field" id="quick-add-category-field">
      <span>Category</span>
      <select id="quick-add-category">
        <option value="grocery">Grocery</option>
        <option value="cosmetics">Cosmetics</option>
        <option value="stationery">Stationery</option>
        <option value="lpg">LPG</option>
        <option value="other">Other</option>
      </select>
    </label>
    <label class="field">
      <span id="quick-add-price-label">Price (Rs.)</span>
      <input id="quick-add-price" type="number" inputmode="decimal" min="0" step="0.01">
    </label>
    <div class="modal-actions">
      <button id="quick-add-cancel" class="btn btn-cancel" type="button">Cancel</button>
      <button id="quick-add-save" class="btn btn-ok" type="button">SAVE &amp; ADD</button>
    </div>
  </div>
</div>

<!-- Scanner modal -->
<div id="scanner-modal" class="modal" hidden>
  <div class="modal-box modal-box-scanner">
    <h3>Scan barcode</h3>
    <div id="scanner-viewport" class="scanner-viewport">
      <video id="scanner-video" playsinline hidden></video>
      <div id="html5qr-region"></div>
      <button id="scanner-switch" class="scanner-switch" type="button" hidden>🔄 Flip camera</button>
    </div>
    <p id="scanner-status" class="scanner-status">Starting camera…</p>
    <div class="modal-actions">
      <button id="scanner-cancel" class="btn btn-cancel" type="button">Close</button>
    </div>
  </div>
</div>

<div id="toast" class="toast" hidden></div>

<script src="{{ url_for('static', filename='html5-qrcode.min.js') }}"></script>
<script src="{{ url_for('static', filename='scanner.js') }}"></script>
<script src="{{ url_for('static', filename='cashier.js') }}"></script>
</body>
</html>
