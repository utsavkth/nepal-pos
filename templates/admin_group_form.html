{% extends "admin_base.html" %}
{% block title %}{{ "Add group" if mode == "new" else "Edit group" }}{% endblock %}
{% block content %}
<h1>{{ "Add group" if mode == "new" else "Edit group" }}</h1>
{% if error %}<p class="error">{{ error }}</p>{% endif %}

<form method="post" class="product-form">
  <label>Name (shown on the cashier button)
    <input name="name" required value="{{ group.name if group else '' }}" placeholder="e.g. Oil">
  </label>
  <label>Nepali name (optional — shown when the cashier is in Nepali)
    <input name="name_ne" value="{{ group.name_ne if group and group.name_ne else '' }}" placeholder="e.g. तेल">
  </label>
  <label class="checkbox">
    <input type="checkbox" name="is_weighed" value="1" {% if group and group.is_weighed %}checked{% endif %}>
    Sold by weight (per kg) — opens the weight pad. Leave unticked for fixed-price
    items (bottles, cylinders, packets…).
  </label>
  <label>Order (lower numbers appear first on the cashier)
    <input name="sort_order" type="number" step="1" value="{{ group.sort_order if group else 0 }}">
  </label>
  <div class="form-actions">
    <button type="submit">{{ "Add group" if mode == "new" else "Save changes" }}</button>
    <a class="button secondary" href="{{ url_for('admin_groups') }}">Cancel</a>
  </div>
</form>
{% endblock %}
