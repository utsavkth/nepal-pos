{% extends "admin_base.html" %}
{% block title %}Change password{% endblock %}
{% block content %}
<h1>Change password</h1>
{% if error %}<p class="error">{{ error }}</p>{% endif %}

<form method="post" class="product-form">
  <label>Current password
    <input name="current" type="password" autocomplete="current-password" required>
  </label>
  <label>New password
    <input name="password" type="password" autocomplete="new-password" minlength="{{ min_len }}" required>
  </label>
  <label>Confirm new password
    <input name="confirm" type="password" autocomplete="new-password" minlength="{{ min_len }}" required>
  </label>
  <div class="form-actions">
    <button type="submit">Change password</button>
    <a class="button secondary" href="{{ url_for('admin_products') }}">Cancel</a>
  </div>
</form>
{% endblock %}
